<div class="connect-container">

    <div class="corner top-left"></div>

    <div class="corner bottom-left"></div>
    <div class="corner bottom-right"></div>

    <div class="card-content">
      <h1 class="title">
        <span class="white">Claim Your</span>
        <span class="green">qOne Tokens</span>

      <div class="buttons">

      </div>

      <a href="https://qlabs.tech/blog/qone-faqs-token-sale-claiming-airdrop-details" target="_blank" class="info-link">How Claiming Works?</a>

  </div>
